<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>단추 — 오늘의 단어 추천</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ivory: #F5F0E8;
    --ivory-dark: #EDE6D8;
    --ivory-card: #EDEAD0;
    --brown-light: #C8A882;
    --brown: #9A7B5A;
    --text-main: #3A2E22;
    --text-sub: #7A6A54;
    --text-muted: #B0A090;
    --accent: #C46B3A;
    --accent-soft: #D4845A;
    --border: #DDD3BE;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--ivory);
    color: var(--text-main);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* HEADER */
  header {
    background: var(--ivory);
    border-bottom: 1px solid var(--border);
    padding: 16px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-img {
    width: 44px;
    height: 44px;
    object-fit: contain;
  }

  .logo-text {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-sub);
    letter-spacing: 0.02em;
    line-height: 1.4;
  }

  .logo-text strong {
    display: block;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-main);
    letter-spacing: -0.01em;
  }

  .header-shortcut {
    font-size: 13px;
    color: var(--text-sub);
    letter-spacing: 0.02em;
  }

  .header-shortcut span {
    font-weight: 500;
    color: var(--accent);
  }

  /* MAIN LAYOUT */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* CATEGORY FILTER */
  .category-section {
    margin-bottom: 48px;
  }

  .category-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .category-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .pill {
    padding: 7px 18px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-sub);
    cursor: pointer;
    transition: all 0.18s ease;
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  .pill:hover {
    border-color: var(--accent-soft);
    color: var(--accent);
  }

  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 500;
  }

  /* TODAY'S WORD — CENTER HERO */
  .word-hero {
    text-align: center;
    padding: 64px 24px;
    background: var(--ivory-dark);
    border-radius: 20px;
    border: 1px solid var(--border);
    margin-bottom: 40px;
    position: relative;
  }

  .word-hero-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .word-date {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .word-display {
    font-size: clamp(52px, 10vw, 96px);
    font-weight: 700;
    color: var(--text-main);
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 20px;
    transition: opacity 0.3s ease;
  }

  .word-display.fade {
    opacity: 0;
  }

  .word-category-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    background: rgba(196, 107, 58, 0.1);
    padding: 4px 12px;
    border-radius: 100px;
    letter-spacing: 0.05em;
    margin-bottom: 20px;
  }

  .word-desc {
    font-size: 14px;
    color: var(--text-sub);
    max-width: 400px;
    margin: 0 auto 28px;
    line-height: 1.7;
  }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 20px;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: var(--ivory);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-sub);
    cursor: pointer;
    transition: all 0.18s;
  }

  .copy-btn:hover {
    border-color: var(--accent-soft);
    color: var(--accent);
  }

  /* CATEGORY WORD RESULT */
  .cat-result {
    background: var(--ivory-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 40px;
    display: none;
  }

  .cat-result.visible {
    display: block;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .cat-result-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .cat-word {
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 700;
    color: var(--text-main);
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  .cat-word-desc {
    font-size: 13px;
    color: var(--text-sub);
    margin-bottom: 16px;
  }

  .reshuffle-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: var(--ivory);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-sub);
    cursor: pointer;
    transition: all 0.18s;
  }

  .reshuffle-btn:hover {
    border-color: var(--accent-soft);
    color: var(--accent);
  }

  /* MEMO */
  .memo-section {
    background: var(--ivory);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }

  .memo-header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .memo-title-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .memo-char-count {
    font-size: 11px;
    color: var(--text-muted);
  }

  .memo-body {
    padding: 28px;
  }

  .memo-textarea {
    width: 100%;
    min-height: 280px;
    border: none;
    background: transparent;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    color: var(--text-main);
    line-height: 1.8;
    resize: vertical;
    outline: none;
  }

  .memo-textarea::placeholder {
    color: var(--text-muted);
  }

  .memo-footer {
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .memo-hint {
    font-size: 12px;
    color: var(--text-muted);
  }

  .clear-btn {
    font-size: 12px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: color 0.18s;
  }

  .clear-btn:hover {
    color: var(--accent);
  }

  /* SECTION DIVIDER */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 48px 0 40px;
  }

  .section-divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-divider-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text-main);
    color: var(--ivory);
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.25s ease;
    pointer-events: none;
    z-index: 999;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>

// Flatten all words
const allWords = Object.entries(words).flatMap(([cat, arr]) =>
  arr.map(w => ({ ...w, cat }))
);

// Seeded random for daily word (same word all day)
function seededRandom(seed) {
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function getTodayWord() {
  const d = new Date();
  const seed = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
  const idx = Math.floor(seededRandom(seed) * allWords.length);
  return allWords[idx];
}

// Init
let currentCat = "전체";

function init() {
  const d = new Date();
  document.getElementById("today-date").textContent =
    `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일`;

  const todayWord = getTodayWord();
  document.getElementById("hero-word").textContent = todayWord.word;
  document.getElementById("hero-cat-tag").textContent = todayWord.cat;
  document.getElementById("hero-desc").textContent = todayWord.desc;
}

// Category pills
document.querySelectorAll(".pill").forEach(pill => {
  pill.addEventListener("click", function () {
    const cat = this.dataset.cat;
    document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
    this.classList.add("active");
    currentCat = cat;

    if (cat === "전체") {
      document.getElementById("cat-result").classList.remove("visible");
    } else {
      showCatWord(cat);
    }
  });
});

function showCatWord(cat) {
  const pool = words[cat];
  const pick = pool[Math.floor(Math.random() * pool.length)];
  document.getElementById("cat-result-label").textContent = cat + " 카테고리";
  document.getElementById("cat-word").textContent = pick.word;
  document.getElementById("cat-word-desc").textContent = pick.desc;
  document.getElementById("cat-result").classList.add("visible");
}

function reshuffleCat() {
  if (currentCat !== "전체") showCatWord(currentCat);
}

// Copy
function copyWord() {
  const word = document.getElementById("hero-word").textContent;
  navigator.clipboard.writeText(word);
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

// Memo
function updateCount() {
  const len = document.getElementById("memo").value.length;
  document.getElementById("char-count").textContent = len + "자";
}

function clearMemo() {
  document.getElementById("memo").value = "";
  updateCount();
}
